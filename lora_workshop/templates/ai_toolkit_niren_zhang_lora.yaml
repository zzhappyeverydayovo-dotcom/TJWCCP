# Template reference for AI Toolkit LoRA training.
# The executable dry-run renderer writes a concrete config to each trial:
# lora_workshop/runs/<run>/trial_xxx/trainer_config/ai_toolkit_config.yaml

job: extension
config:
  name: "{{ project }}_{{ lora_id }}"
  process:
    - type: sd_trainer
      training_folder: "{{ output_dir }}"
      device: cuda:0
      network:
        type: lora
        linear: "{{ rank }}"
        linear_alpha: "{{ alpha }}"
      save:
        dtype: bf16
        save_every: "{{ save_every }}"
        max_step_saves_to_keep: 4
      datasets:
        - folder_path: "{{ dataset_dir }}"
          caption_ext: txt
          resolution:
            - "{{ resolution }}"
          cache_latents_to_disk: true
          caption_dropout_rate: "{{ caption_dropout }}"
      train:
        batch_size: "{{ batch_size }}"
        steps: "{{ steps }}"
        gradient_accumulation_steps: "{{ gradient_accumulation }}"
        train_unet: true
        train_text_encoder: false
        gradient_checkpointing: true
        optimizer: "{{ optimizer }}"
        lr: "{{ learning_rate }}"
        dtype: bf16
      model:
        name_or_path: "{{ base_model }}"
        quantize: true
      sample:
        width: 1024
        height: 1024
        guidance_scale: 6.5
        sample_steps: 28
        neg: "{{ negative_prompt }}"
        prompts:
          - "{{ eval_prompt_1 }}"
          - "{{ eval_prompt_2 }}"
meta:
  project_cn: "天津地域文化文创产品智能生成应用系统"
  primary_scene: "泥人张彩塑"
